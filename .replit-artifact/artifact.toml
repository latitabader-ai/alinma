kind = "web"
previewPath = "/"
title = "Alinma Bank UI"
version = "1.0.0"
id = "artifacts/alinma-ui"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24558

[services.development]
run = "pnpm --filter @workspace/alinma-ui run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/alinma-ui", "run", "build" ]
publicDir = "artifacts/alinma-ui/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24558"
BASE_PATH = "/"
